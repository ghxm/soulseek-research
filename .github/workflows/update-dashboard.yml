name: Update Statistics Dashboard

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC (after cron jobs finish)
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: github-pages
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements-dashboard.txt

      - name: Open SSH tunnel to database
        env:
          DB_SERVER_SSH_KEY: ${{ secrets.DB_SERVER_SSH_KEY }}
          DB_SERVER_IP: ${{ secrets.DB_SERVER_IP }}
        run: |
          mkdir -p ~/.ssh
          echo "$DB_SERVER_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DB_SERVER_IP" >> ~/.ssh/known_hosts
          ssh -f -N -L 5432:localhost:5432 root@"$DB_SERVER_IP"

      - name: Generate statistics
        env:
          DATABASE_URL: postgresql://soulseek:${{ secrets.DB_PASSWORD }}@localhost:5432/soulseek
          QUERY_BLACKLIST: ${{ vars.QUERY_BLACKLIST }}
        run: python -u scripts/generate_stats.py

      - name: Configure analytics
        if: vars.GOATCOUNTER_URL != ''
        env:
          GOATCOUNTER_URL: ${{ vars.GOATCOUNTER_URL }}
        run: |
          echo "goatcounter_url: \"${GOATCOUNTER_URL}\"" >> docs/_config.yml

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
