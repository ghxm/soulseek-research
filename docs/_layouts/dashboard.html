<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soulseek Search Monitor - {{ page.title | default: "Dashboard" }}</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: white;
        }

        {% include nav-styles.html %}

        @media (max-width: 768px) {
            .stats-tables {
                flex-direction: column;
                gap: 20px;
            }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            padding: 30px;
        }

        h1 {
            color: black;
            border-bottom: 2px solid black;
            padding-bottom: 10px;
            font-weight: 600;
        }

        h2 {
            color: black;
            margin-top: 40px;
            border-bottom: 1px solid #ccc;
            padding-bottom: 8px;
            font-weight: 600;
        }

        .stats-tables {
            display: flex;
            gap: 60px;
            margin: 30px auto;
            padding: 20px 0;
            justify-content: center;
        }

        .stats-table {
            border-collapse: collapse;
            min-width: 280px;
        }

        .stats-table caption {
            text-align: left;
            font-size: 13px;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding-bottom: 12px;
        }

        .stats-table td {
            border-bottom: 1px solid #eee;
        }

        .stats-table tr:last-child td {
            border-bottom: none;
        }

        .stats-label {
            color: #666;
            font-size: 15px;
            padding: 10px 30px 10px 0;
        }

        .stats-value {
            font-size: 15px;
            font-weight: 600;
            color: black;
            text-align: right;
            padding: 10px 0;
        }

        .chart {
            margin: 30px 0;
            border: 1px solid #eee;
            padding: 10px;
        }

        .timestamp {
            color: #666;
            font-size: 14px;
            margin-top: 20px;
        }

        .period-range {
            color: #666;
            font-size: 16px;
            margin: -10px 0 10px 0;
            font-weight: 400;
        }

        .period-title {
            color: #666;
            font-size: 18px;
            margin-bottom: 10px;
        }

    </style>
    <script src="https://cdn.plot.ly/plotly-3.3.0.min.js" charset="utf-8"></script>
    <script src="{{ site.baseurl }}/assets/sqljs/sqljs-httpvfs.js"></script>
</head>
<body>
    {% include nav.html %}

    <div class="container">
        {{ content }}

        <div class="footer">
            <p>Soulseek Research Project | Data collected from distributed geographic locations</p>
            <p>All usernames are cryptographically hashed for privacy</p>
            <p><a href="https://github.com/ghxm/soulseek-research">View on GitHub</a></p>
        </div>
    </div>
{% if site.goatcounter_url and site.goatcounter_url != "" %}
<script data-goatcounter="{{ site.goatcounter_url }}" async src="//gc.zgo.at/count.js"></script>
{% endif %}
</body>
</html>
