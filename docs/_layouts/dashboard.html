<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soulseek Search Monitor - {{ page.title | default: "Dashboard" }}</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: white;
        }

        /* Combined header and navigation bar */
        nav.period-nav {
            background: #f8f8f8;
            border-bottom: 2px solid #333;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-logo {
            width: 24px;
            height: 24px;
            flex-shrink: 0;
            filter: grayscale(100%) brightness(0.4);
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            flex-shrink: 0;
        }

        .nav-brand:hover {
            opacity: 0.8;
        }

        .nav-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin: 0;
            flex-shrink: 0;
        }

        .nav-menu {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            justify-content: space-around;
            width: 24px;
            height: 20px;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 0;
            margin-left: auto;
        }

        .hamburger span {
            width: 100%;
            height: 2px;
            background: #333;
            border-radius: 2px;
            transition: all 0.3s;
        }

        @media (max-width: 768px) {
            .stats-tables {
                flex-direction: column;
                gap: 20px;
            }

            nav.period-nav {
                flex-wrap: wrap;
            }

            .hamburger {
                display: flex;
            }

            .nav-menu {
                display: none;
                width: 100%;
                flex-direction: column;
                align-items: flex-start;
                padding-top: 15px;
                gap: 10px;
            }

            .nav-menu.open {
                display: flex;
            }

            .nav-menu .nav-separator {
                display: none;
            }

            .nav-menu .dropdown {
                width: 100%;
            }

            .nav-menu .dropdown > span {
                display: block;
                width: 100%;
            }

            .nav-menu .dropdown-content {
                position: static;
                box-shadow: none;
                border: none;
                border-left: 2px solid #ccc;
                margin-left: 10px;
                display: none;
            }

            .nav-menu .dropdown.open .dropdown-content {
                display: block;
            }

            .nav-menu .dropdown:hover .dropdown-content {
                display: none;
            }

            .nav-menu .dropdown.open:hover .dropdown-content {
                display: block;
            }

            .nav-menu > a {
                width: 100%;
            }
        }

        .nav-separator {
            color: #ccc;
            font-weight: 300;
            margin: 0 5px;
        }

        nav.period-nav a {
            color: #333;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        nav.period-nav a:hover {
            background: #e0e0e0;
        }

        nav.period-nav a.active {
            background: #333;
            color: white;
            font-weight: 600;
        }


        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown > span {
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .dropdown > span:hover {
            background: #e0e0e0;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background-color: white;
            min-width: 160px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
            z-index: 1;
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #333;
        }

        .dropdown-content a {
            color: black;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            border-radius: 0;
        }

        .dropdown-content a:hover {
            background-color: #f5f5f5;
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            padding: 30px;
        }

        h1 {
            color: black;
            border-bottom: 2px solid black;
            padding-bottom: 10px;
            font-weight: 600;
        }

        h2 {
            color: black;
            margin-top: 40px;
            border-bottom: 1px solid #ccc;
            padding-bottom: 8px;
            font-weight: 600;
        }

        .stats-tables {
            display: flex;
            gap: 60px;
            margin: 30px 0;
            padding: 20px 0;
        }

        .stats-table {
            border-collapse: collapse;
        }

        .stats-table caption {
            text-align: left;
            font-size: 13px;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding-bottom: 12px;
        }

        .stats-label {
            color: #666;
            font-size: 15px;
            padding: 6px 30px 6px 0;
        }

        .stats-value {
            font-size: 15px;
            font-weight: 600;
            color: black;
            text-align: right;
            padding: 6px 0;
        }

        .chart {
            margin: 30px 0;
            border: 1px solid #eee;
            padding: 10px;
        }

        .footer {
            margin-top: 50px;
            text-align: center;
            color: #999;
            font-size: 14px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .footer a {
            color: #666;
            text-decoration: none;
            border-bottom: 1px solid #666;
        }

        .timestamp {
            color: #666;
            font-size: 14px;
            margin-top: 20px;
        }

        .period-range {
            color: #666;
            font-size: 16px;
            margin: -10px 0 10px 0;
            font-weight: 400;
        }

        .period-title {
            color: #666;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .info-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 1.5px solid #999;
            color: #999;
            font-size: 12px;
            font-weight: 600;
            font-style: normal;
            cursor: pointer;
            position: relative;
            vertical-align: middle;
            margin-left: 6px;
            line-height: 1;
        }

        .info-icon:hover {
            border-color: #333;
            color: #333;
        }

        .info-tooltip {
            display: none;
            position: absolute;
            left: 50%;
            top: calc(100% + 8px);
            transform: translateX(-50%);
            background: #333;
            color: white;
            font-size: 13px;
            font-weight: 400;
            line-height: 1.5;
            padding: 10px 14px;
            border-radius: 4px;
            width: 300px;
            z-index: 100;
            white-space: normal;
        }

        .info-tooltip::before {
            content: '';
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 6px solid transparent;
            border-bottom-color: #333;
        }

        .info-icon:hover .info-tooltip,
        .info-icon.open .info-tooltip {
            display: block;
        }

        @media (max-width: 768px) {
            .info-tooltip {
                left: auto;
                right: -10px;
                transform: none;
            }

            .info-tooltip::before {
                left: auto;
                right: 14px;
                transform: none;
            }
        }

        .query-search {
            position: relative;
            margin-left: auto;
            display: flex;
            align-items: center;
        }

        .query-search-icon {
            width: 16px;
            height: 16px;
            color: #999;
            position: absolute;
            left: 10px;
            pointer-events: none;
        }

        .query-search input {
            padding: 6px 12px 6px 32px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            width: 200px;
            font-family: inherit;
        }

        .query-search input:focus {
            outline: none;
            border-color: #333;
        }

        .query-search-results {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            width: 380px;
            max-height: 480px;
            overflow-y: auto;
            background: white;
            border: 1px solid #333;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            z-index: 1001;
        }

        .query-search-item {
            display: flex;
            flex-direction: column;
            padding: 10px 14px;
            text-decoration: none;
            border-bottom: 1px solid #f0f0f0;
            color: #333;
        }

        .query-search-item:hover {
            background: #f5f5f5;
        }

        .query-search-name {
            font-size: 14px;
            font-weight: 500;
        }

        .query-search-meta {
            font-size: 11px;
            color: #999;
            margin-top: 2px;
        }

        .query-search-nopage {
            opacity: 0.5;
            cursor: default;
        }

        .query-search-empty {
            padding: 12px 14px;
            color: #999;
            font-size: 13px;
        }

        @media (max-width: 768px) {
            .query-search {
                width: 100%;
                margin-left: 0;
            }

            .query-search input {
                width: 100%;
                box-sizing: border-box;
            }

            .query-search-results {
                width: 100%;
                left: 0;
                right: auto;
            }
        }
    </style>
</head>
<body>
    {% include nav.html %}

    <div class="container">
        {{ content }}

        <div class="footer">
            <p>Soulseek Research Project | Data collected from distributed geographic locations</p>
            <p>All usernames are cryptographically hashed for privacy</p>
            <p><a href="https://github.com/ghxm/soulseek-research">View on GitHub</a></p>
        </div>
    </div>
{% if site.goatcounter_url and site.goatcounter_url != "" %}
<script data-goatcounter="{{ site.goatcounter_url }}" async src="//gc.zgo.at/count.js"></script>
{% endif %}
</body>
</html>
