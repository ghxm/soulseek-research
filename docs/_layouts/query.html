<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.query_display }} - Soulseek Search Monitor</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: white;
            color: #333;
        }

        {% include nav-styles.html %}

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px;
        }

        .breadcrumb {
            font-size: 14px;
            color: #999;
            margin-bottom: 10px;
        }

        .breadcrumb a {
            color: #666;
            text-decoration: none;
            border-bottom: 1px solid #ccc;
        }

        .breadcrumb a:hover { color: #333; border-color: #333; }

        h1 {
            color: black;
            border-bottom: 2px solid black;
            padding-bottom: 10px;
            font-weight: 600;
            word-break: break-word;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin: 25px 0;
        }

        .stat-card {
            background: white;
            padding: 15px;
            border: 1px solid #333;
        }

        .stat-card h3 {
            margin: 0;
            font-size: 12px;
            font-weight: 400;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-card .value {
            font-size: 24px;
            font-weight: 600;
            margin: 8px 0 4px 0;
            color: black;
        }

        .stat-card .label {
            font-size: 11px;
            color: #999;
        }

        .chart-container {
            margin: 30px 0;
        }

        .chart-container svg {
            width: 100%;
            height: auto;
        }

        .similar-queries {
            margin: 30px 0;
        }

        .similar-queries h2 {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
        }

        .similar-queries ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .similar-queries li {
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: baseline;
            gap: 10px;
        }

        .similar-queries li:last-child {
            border-bottom: none;
        }

        .similar-queries a {
            color: #333;
            text-decoration: none;
            border-bottom: 1px solid #ccc;
        }

        .similar-queries a:hover {
            color: #000;
            border-color: #333;
        }

        .similar-queries .sim-meta {
            font-size: 12px;
            color: #999;
            white-space: nowrap;
        }

        .back-link {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .back-link a {
            color: #666;
            text-decoration: none;
            border-bottom: 1px solid #ccc;
            font-size: 14px;
        }

        .back-link a:hover { color: #333; border-color: #333; }
    </style>
    <script src="{{ site.baseurl }}/assets/sqljs/sqljs-httpvfs.js"></script>
</head>
<body>
    {% include nav.html %}

    <div class="container">
        {{ content }}

        <div class="footer">
            <p>Soulseek Research Project | Data collected from distributed geographic locations</p>
            <p>All usernames are cryptographically hashed for privacy</p>
            <p><a href="https://github.com/ghxm/soulseek-research">View on GitHub</a></p>
        </div>
    </div>
{% if site.goatcounter_url and site.goatcounter_url != "" %}
<script data-goatcounter="{{ site.goatcounter_url }}" async src="//gc.zgo.at/count.js"></script>
{% endif %}
</body>
</html>
